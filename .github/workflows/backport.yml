name: Backport

on:
  pull_request:
    types:
      - closed
    branches:
      - main

permissions:
  actions: write
  issues: write

jobs:
  backport:
    if: join(github.event.pull_request.labels) != '' &&
      github.event.pull_request.merged == true &&
      github.event.pull_request.user.login != 'renovate[bot]'
    uses: sbb-design-systems/actions/.github/workflows/backport.yml@main
    secrets:
      client-id: ${{ secrets.MAINTENANCE_APP_ID }}
      private-key: ${{ secrets.MAINTENANCE_APP_PEM }}
