name: Pull Request Labelling

on:
  pull_request:
    types: [opened, edited, labeled]
    branches: [main] # target branch

permissions:
  pull-requests: write

jobs:
  labelling:
    uses: sbb-design-systems/actions/.github/workflows/pull-request-labelling.yml@main
    secrets:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
