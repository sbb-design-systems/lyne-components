name: Test Secure
# Secure execution of continuous integration jobs
# which are performed upon completion of the
# "Continuous Integration" workflow
# https://securitylab.github.com/research/github-actions-preventing-pwn-requests/
on:
  workflow_run:
    workflows: [Test]
    types: [completed]

jobs:
  codecov:
    runs-on: ubuntu-slim
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success'
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
      - name: Create GitHub App token
        id: token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.BOT_ID }}
          private-key: ${{ secrets.BOT_PEM }}
      - uses: actions/download-artifact@v8
        with:
          name: coverage
          path: coverage/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ steps.token.outputs.token }}
      - name: Read Pull Request Number
        id: pr-number
        run: echo "result=$(cat coverage/pr)" >> "$GITHUB_OUTPUT"
        shell: bash
      - uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: coverage
          override_branch: ${{ github.event.workflow_run.head_branch }}
          override_commit: ${{ github.event.workflow_run.head_commit.id }}
          override_pr: ${{ steps.pr-number.outputs.result }}
          fail_ci_if_error: true
          verbose: true
