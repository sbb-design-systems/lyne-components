name: Test
on: [push, pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions: read-all

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: yarn
      - run: yarn install --frozen-lockfile --non-interactive
      - uses: actions/cache@v6
        id: cache
        with:
          path: node_modules/.cache/lyne-cdn/
          key: test-build-cache-${{ hashFiles('**/tools/web-test-runner/preload-*.ts') }}
          restore-keys: test-build-cache-
      - name: Output test cache structure
        run: echo "${{ github.ref }}"
        shell: bash

      - name: Run lint
        run: yarn test:tsc

      - name: Preload test artifacts
        if: steps.cache.outputs.cache-hit != 'true'
        run: node scripts/preload-test-artifacts.ts

  test:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble
      options: --user 1001
    needs: setup
    env:
      max-segment: 5
    strategy:
      fail-fast: false
      matrix:
        segment: [1, 2, 3, 4, 5]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: yarn
      - run: yarn install --frozen-lockfile --non-interactive
      - name: Restore test cache
        uses: actions/cache@v6
        with:
          path: node_modules/.cache/lyne-cdn/
          key: test-build-cache-${{ hashFiles('**/tools/web-test-runner/preload-*.ts') }}
          restore-keys: test-build-cache-
      - name: Output test cache structure
        run: echo "${{ github.ref }}"
        shell: bash
      - name: Output test cache structure
        run: ls -llR node_modules/.cache/

      - name: Run tests
        run: yarn test --segment=${{ matrix.segment }}/${{ env.max-segment }}
        env:
          NODE_ENV: production
      - name: Assert no new snapshots (run `yarn test --ci` if this fails)
        run: git diff --exit-code

      - name: Store coverage
        if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: matrix-coverage-${{ matrix.segment }}
          path: coverage/
          retention-days: 1

  finalize:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: yarn
      - run: yarn install --frozen-lockfile --non-interactive

      - uses: actions/download-artifact@v8
      - name: Assemble code coverage
        run: |
          mkdir coverage-matrix
          for file in */coverage-final.json; do
            mv "$file" "coverage-matrix/$(basename $(dirname $file)).json"
          done

          yarn nyc report \
            --temp-dir coverage-matrix \
            --report-dir coverage \
            --reporter lcov
          rm -rf coverage-matrix
      - name: Store coverage
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/
          retention-days: 1
      - uses: codecov/codecov-action@v7
        if: github.ref == 'refs/heads/main'
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: coverage
          fail_ci_if_error: true
          verbose: true
